<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="20" y1="18" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop stop-color="#69E4FF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <mask id="boltCut" maskUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
      <rect width="128" height="128" fill="white"/>
      <!-- black = cut out from the D -->
      <path d="M78 34L60.2 60.6H72.5L55 94L58.2 66.4H45.5L78 34Z" fill="black" transform="translate(64 64) scale(1.18) translate(-64 -64)"/>
    </mask>
  </defs>

  <!-- Rounded tile (light) -->
  <rect x="12" y="12" width="104" height="104" rx="28" fill="rgba(255,255,255,0.78)" stroke="rgba(15,23,42,0.14)" />

  <!-- D monogram with lightning cutout -->
  <g mask="url(#boltCut)">
    <!-- Outer D -->
    <path
      d="M44 36H68.5C86.5 36 101 50.5 101 68.5C101 86.5 86.5 101 68.5 101H44V36Z"
      fill="url(#g)"
      opacity="0.95"
    />
    <!-- Inner counter -->
    <path
      d="M55 48H68.2C79.2 48 88.2 57 88.2 68C88.2 79 79.2 88 68.2 88H55V48Z"
      fill="rgba(255,255,255,0.96)"
    />
  </g>

  <!-- Lightning highlight so it stays legible -->
  <path d="M78 34L60.2 60.6H72.5L55 94L58.2 66.4H45.5L78 34Z" fill="#F59E0B" opacity="0.96" transform="translate(64 64) scale(1.18) translate(-64 -64)"/>
</svg>
